<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Task Tracker</h1>
        <h2>Simplify.Organize.Streamline</h2>
    </header>
    <main>
        <section id="form-section">
            <h2>Add a new task</h2>
            <form id="task-form">
                <div>
                    <label for="task-name">Name of the task:</label>
                    <input type="text" id="task-name" name="task-name" placeholder="Enter task name" required>
                </div>
                <div>
                    <label for="priority">Give the priority to your task:</label>
                    <select id="priority" name="priority" required>
                        <option value="">Select the priority</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div>
                    <label for="due-date">Provide the Due Date:</label>
                    <input type="date" id="due-date" name="due-date" required>
                </div>
                <button type="submit">Add Task</button>
            </form>
        </section>
        <section id="list-section">
            <h2>Task List</h2>
            <div >
                <button id="all">All</button>
                <button id="pending">Pending</button>
                <button id="done">Done</button>
            </div>
            <div>
                <label for="sort-by">Sort By:</label>
                <select id="sort-by">
                    <option value="">Select</option>
                    <option value="priority">Priority</option>
                    <option value="dueDate">Due Date</option>
                </select>
                <p id="task-counter">Showing 0 of 0 tasks</p>
            </div>
            <ul id="task-list"></ul>
            <button type="button" id="clear-all">Clear All</button>
        </section>
        <section id="summary-section">
            <h2>Priority Summary</h2>
            <table id="priority-table">
                <thead>
                    <tr>
                        <th>Priority</th>
                        <th>Count</th>
                        <th>Tasks</th>
                    </tr>
                </thead>
                <tbody id="priority-table-body"></tbody>
            </table>
            <h2>Task Sumary</h2>
            <table id="task-table">
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Priority</th>
                        <th>Due Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="task-table-body"></tbody>
            </table>
        </section>
         
    </main>
    <footer>
        <p>&copy;2026 Task Tracker</p>
        <p>Created by Maria Liviya</p>
    </footer>
  
    <script type="module" src="main.js"></script>
</body>
</html>
